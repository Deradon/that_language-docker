name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  image:
    name: build and smoke-test the image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # ubuntu-latest ships Docker, so a plain build needs no setup action.
      # Only the default gem-10k tier is built: the larger tiers need a separate
      # private repository staged into the build context, which CI must not
      # depend on.
      - name: Build
        run: docker build -t that_language-service:ci .

      # Every assertion lives in bin/smoke so it is runnable locally against the
      # same image, rather than only reproducible by pushing.
      - name: Smoke-test
        run: ./bin/smoke that_language-service:ci
